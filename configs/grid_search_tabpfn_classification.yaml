# Single-run configuration for TabPFN classification fire detection training.
#
# Usage:
#   python train_tabpfn_classification.py --config configs/grid_search_tabpfn_classification.yaml
#
# Default hyperparameters from TabPFN GitHub examples:
#   https://github.com/PriorLabs/TabPFN/blob/main/examples/finetune_classifier.py
#
# Grid size: 1 run (single default config).

data_dir: /Volumes/fire_dev/challenge_data/data

epochs: 30
metric: error_rate          # minimize (FN+FP)/P on test set
seed: 0
save_every: 5               # save checkpoint every N epochs for crash recovery

search_space:
  learning_rate: [2.0e-5]
  batch_size: [512]
  n_estimators: [2]
  weight_decay: [0.01]
  grad_clip_norm: [1.0]
