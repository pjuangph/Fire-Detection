# Single-run configuration for TabPFN regression fire detection training.
#
# Usage:
#   python train_tabpfn_regression.py --config configs/grid_search_tabpfn_regression.yaml
#
# Default hyperparameters from TabPFN GitHub examples:
#   https://github.com/PriorLabs/TabPFN/blob/main/examples/finetune_regressor.py
#
# Grid size: 1 run (single default config).

epochs: 30
metric: error_rate          # minimize (FN+FP)/P on test set
seed: 0
save_every: 5               # save checkpoint every N epochs for crash recovery

search_space:
  learning_rate: [1.0e-5]
  batch_size: [512]
  n_estimators: [8]
  weight_decay: [0.01]
  grad_clip_norm: [1.0]
  crps_loss_weight: [1.0]
  mse_loss_weight: [1.0]
